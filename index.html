<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UK-Beats</title>
  <meta name="description" content="Next-generation music streaming experience" />
  <meta name="theme-color" content="#0d0d0f" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="icon" type="image/png" href="/logo.png" />
</head>

<body>
  <!-- 
    Real DOM audio element — REQUIRED for Android Chrome MediaSession notification player.
    We use opacity/position instead of display:none because some browsers throttle "invisible" elements.
  -->
  <audio id="uk-beats-audio" preload="auto"
    style="position: absolute; width: 1px; height: 1px; left: -100px; opacity: 0.01; pointer-events: none;"></audio>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
